ekf_filter_node:
  ros__parameters:
    # 1. 核心坐标系配置
    frequency: 30.0
    sensor_timeout: 0.1
    two_d_mode: true
    publish_tf: true
    publish_acceleration: false
    print_diagnostics: true
    
    # 平滑处理
    smooth_lagged_data: true
    history_length: 5.0

    # 输出坐标系
    odom_frame: odom
    base_link_frame: base_footprint
    world_frame: odom

    # 2. 轮式里程计
    odom0: /wheel_odom
    odom0_config: [true, true, false,
                   false, false, true,
                   true, true, false,
                   false, false, false,  # vyaw设为false
                   false, false, false]
    odom0_queue_size: 10
    odom0_nodelay: true
    odom0_differential: true      # 改为true，提高鲁棒性
    odom0_relative: false
    odom0_pose_rejection_threshold: 10.0
    odom0_twist_rejection_threshold: 1.0

    # 3. 激光里程计
    odom1: /laser_odom
    odom1_config: [true, true, false,
                   false, false, true,
                   false, false, false,
                   false, false, false,
                   false, false, false]  # 完整15维
    odom1_queue_size: 10
    odom1_nodelay: true
    odom1_differential: true      # 改为true
    odom1_relative: false
    odom1_pose_rejection_threshold: 5.0   # 激光里程计通常精度更高
    odom1_twist_rejection_threshold: 0.5